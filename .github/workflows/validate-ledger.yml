# validate-ledger.yml — the sharded experiment ledger (Protocol 0.5) is a
# first-class, mechanically-validated surface. Every example's state/ledger/
# must be schema-valid with unique ids and resolvable parent_ids, and the
# reference ledger tooling must keep its unit + integration tests green.
#
# The ledger reference scripts are stdlib-only — that's the point: any consumer
# (Python or not) can run/validate the contract without deps. The only exception
# is the §10.5 verifier (verify_request.py), which parses YAML config and so
# needs PyYAML (installed only for the verifier test step, mirroring
# validate-examples).

name: validate-ledger

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'PROTOCOL.md'
      - 'template/scripts/**'
      - 'template/schema/**'
      - 'examples/**'
      - '.github/workflows/validate-ledger.yml'

permissions:
  contents: read

jobs:
  validate-example-ledgers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: validate_ledger.py over every example state/ledger/
        run: |
          set -e
          shopt -s nullglob
          found=0
          for d in examples/*/state/ledger; do
            found=1
            echo "=== validating $d ==="
            python3 template/scripts/validate_ledger.py --ledger-dir "$d"
          done
          if [ "$found" = "0" ]; then
            echo "::error::no examples/*/state/ledger directories found"
            exit 1
          fi
          echo "OK: all example ledgers valid"

  ledger-tooling-unittests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # The ledger reference scripts (_ledger_common, log_experiment,
      # regenerate_state, validate_ledger, migrate_*) are stdlib-only — prove it
      # by running their suite with NO third-party deps installed.
      - name: Reference ledger tooling — stdlib-only (no deps)
        run: python3 -m unittest template.scripts.tests.test_ledger
      # Everything else (the §10.5 verifier shard-load + malformed-input suites,
      # the split-manifest / comparison-set identity tests, bootstrap_verify, and
      # the scaffold malformed-input suite) parses YAML config and so needs
      # PyYAML, exactly like the validate-examples verifier jobs. Run the WHOLE
      # tests/ directory via unittest discover so new test modules
      # (e.g. test_verifier_malformed_input, test_scaffold_malformed_input) are
      # picked up automatically and never silently skipped on PRs. No jsonschema:
      # the validator is stdlib (see _ledger_common), so PyYAML is the only dep.
      - name: Full scaffold tests via discover (need PyYAML)
        run: |
          pip install pyyaml
          python3 -m unittest discover -s template/scripts/tests -p 'test_*.py'
