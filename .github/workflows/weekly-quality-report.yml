name: Weekly Quality Report

on:
  workflow_dispatch:
  schedule:
    - cron: '20 13 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  quality-report:
    name: Quality report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: pip install pyyaml

      - name: Generate weekly quality report
        id: report
        run: python scripts/weekly_quality_report.py

      - name: Publish job summary
        if: always()
        run: cat .harness/weekly-quality-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload quality report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-quality-report
          include-hidden-files: true
          path: |
            .harness/weekly-quality-report.json
            .harness/weekly-quality-report.md
          if-no-files-found: warn

      - name: Notify via report issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT_TITLE: Weekly Open-AutoResearch Quality Report
        run: |
          gh label create quality-report --color 5319e7 --description "Scheduled quality reports" >/dev/null 2>&1 || true

          REPORT_ISSUE="$(
            gh issue list --state open --search "$REPORT_TITLE in:title" --limit 20 --json number,title \
              --jq ".[] | select(.title == \"$REPORT_TITLE\") | .number" | head -n 1
          )"

          if [ -z "$REPORT_ISSUE" ]; then
            {
              echo "Standing notification thread for weekly Open-AutoResearch quality reports."
              echo
              echo "GitHub notification email delivery depends on repository watch and notification settings."
              echo
              cat .harness/weekly-quality-report.md
            } > .harness/weekly-quality-report-issue.md

            gh issue create \
              --title "$REPORT_TITLE" \
              --body-file .harness/weekly-quality-report-issue.md \
              --assignee "$GITHUB_REPOSITORY_OWNER" \
              --label quality-report || gh issue create \
                --title "$REPORT_TITLE" \
                --body-file .harness/weekly-quality-report-issue.md
          else
            gh issue comment "$REPORT_ISSUE" --body-file .harness/weekly-quality-report.md
          fi

      - name: Create or update problem issue
        if: always() && steps.report.outputs.has_problems == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PROBLEM_TITLE: Open-AutoResearch quality problems detected by weekly report
        run: |
          gh label create quality-problem --color d73a4a --description "Scheduled quality report detected a problem" >/dev/null 2>&1 || true

          PROBLEM_ISSUE="$(
            gh issue list --state open --search "$PROBLEM_TITLE in:title" --limit 20 --json number,title \
              --jq ".[] | select(.title == \"$PROBLEM_TITLE\") | .number" | head -n 1
          )"

          {
            echo "The scheduled Open-AutoResearch quality report detected a problem."
            echo
            cat .harness/weekly-quality-report.md
          } > .harness/weekly-quality-problem.md

          if [ -z "$PROBLEM_ISSUE" ]; then
            gh issue create \
              --title "$PROBLEM_TITLE" \
              --body-file .harness/weekly-quality-problem.md \
              --assignee "$GITHUB_REPOSITORY_OWNER" \
              --label quality-problem || gh issue create \
                --title "$PROBLEM_TITLE" \
                --body-file .harness/weekly-quality-problem.md
          else
            gh issue comment "$PROBLEM_ISSUE" --body-file .harness/weekly-quality-problem.md
          fi

      - name: Fail when quality problems were detected
        if: always() && steps.report.outputs.has_problems == 'true'
        run: |
          echo "Quality problems were detected; notification and issue handling completed."
          exit 1
