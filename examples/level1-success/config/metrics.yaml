protocol_version: "0.4"
cost_tier: small
max_gpu_hours_per_candidate: 3

primary_metric:
  name: validation_nll
  direction: minimize
  aggregation: mean
  eval_dtype: fp32
  minimum_meaningful_delta: 0.005

secondary_metrics:
  - {name: accuracy, direction: maximize, aggregation: ratio, eval_dtype: int}

guardrails:
  - {name: inference_latency_ms, direction: minimize, aggregation: mean, eval_dtype: fp32, max_regression_relative: 0.10}

subgroups: []

promotion:
  require_baseline_rerun: true
  require_candidate_rerun: true
  require_ablation: true
  require_locked_test_set: true

statistics:
  method: paired_bootstrap
  resamples: 10000
  confidence_level: 0.95
  multiple_comparison_correction: holm

evaluator_equivalence:
  defaults_by_dtype:
    fp32: {rtol: 1.0e-4, atol: 1.0e-6}
    bf16: {rtol: 1.0e-2, atol: 1.0e-3}
    fp16: {rtol: 1.0e-3, atol: 1.0e-4}
    int:  {rtol: 0.0,    atol: 0.0}
  per_metric: {}

val_set_exposure_budget: 100

budgets:
  llm:
    max_tokens_total: 5000000
    max_dollars_total: 25.00
    soft_warn_fraction: 0.7
  tool_calls:
    max_calls_total: 2000
  compute:
    max_gpu_hours: 30
    max_wall_clock_hours: 24
  per_iteration_caps_by_level:
    L1: {max_llm_tokens:  500000, max_tool_calls: 100, max_gpu_hours: 3}
    L2: {max_llm_tokens: 1000000, max_tool_calls: 200, max_gpu_hours: 3}
    L3: {max_llm_tokens: 2000000, max_tool_calls: 400, max_gpu_hours: 3}

memory:
  max_playbook_tokens: 8000
  ledger_rotation_iterations: 200

maturity_level: 1
